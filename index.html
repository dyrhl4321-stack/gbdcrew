<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>근방단 출석체크</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:#0a0a0a;color:#f0f0f0;font-family:"Apple SD Gothic Neo","Noto Sans KR",sans-serif;min-height:100vh;max-width:480px;margin:0 auto;}
#page-main,#page-checkin,#page-done,#page-login{display:none;flex-direction:column;min-height:100vh;}
#page-main.active,#page-checkin.active,#page-done.active,#page-login.active{display:flex;}

/* 로그인 */
#page-login{align-items:center;justify-content:center;gap:20px;padding:40px 24px;}
.login-logo{width:90px;height:90px;object-fit:contain;}
.login-title{font-size:16px;font-weight:900;letter-spacing:.3em;color:#eee;}
.login-sub{font-size:11px;color:#444;letter-spacing:.1em;}
.login-input{width:100%;background:#141414;border:1px solid #222;color:#e8e8e8;padding:14px;font-size:20px;font-family:inherit;outline:none;text-align:center;letter-spacing:.3em;}
.login-btn{width:100%;padding:14px;background:#c8f542;border:none;color:#000;font-size:13px;font-weight:900;letter-spacing:.2em;cursor:pointer;font-family:inherit;}
.login-err{font-size:11px;color:#ff4444;letter-spacing:.1em;min-height:16px;}

/* 헤더 */
.header{padding:16px 20px 14px;border-bottom:1px solid #1a1a1a;display:flex;align-items:center;gap:12px;position:sticky;top:0;background:rgba(10,10,10,0.97);z-index:10;backdrop-filter:blur(10px);}
.logo-img{width:32px;height:32px;object-fit:contain;}
.header-titles{flex:1;}
.header-title{font-size:15px;font-weight:900;letter-spacing:.15em;color:#eee;}
.header-sub{font-size:9px;color:#333;letter-spacing:.1em;margin-top:1px;}
.header-add-btn{background:#c8f542;border:none;color:#000;font-size:20px;font-weight:900;width:38px;height:38px;cursor:pointer;flex-shrink:0;border-radius:2px;}

/* 모임 탭 - 카드형으로 변경 */
#meeting-tabs{display:flex;gap:8px;padding:14px 16px;overflow-x:auto;scrollbar-width:none;border-bottom:1px solid #1a1a1a;}
#meeting-tabs::-webkit-scrollbar{display:none;}

.meeting-tab{
  flex-shrink:0;
  min-width:100px;
  padding:10px 14px;
  background:#141414;
  border:1px solid #222;
  border-radius:3px;
  cursor:pointer;
  transition:all .2s;
  display:flex;
  flex-direction:column;
  gap:5px;
}
.meeting-tab.active.jeongmo{background:rgba(200,245,66,.08);border-color:rgba(200,245,66,.3);}
.meeting-tab.active.beong{background:rgba(79,195,247,.08);border-color:rgba(79,195,247,.3);}

.tab-top{display:flex;align-items:center;gap:6px;}
.tab-emoji{font-size:14px;}
.tab-type-label{
  font-size:9px;
  font-weight:700;
  letter-spacing:.12em;
  color:#f0f0f0;
}
.meeting-tab.active .tab-type-label{color:#f0f0f0;}

.tab-date{font-size:14px;font-weight:900;color:#888;letter-spacing:.05em;}
.meeting-tab.active.jeongmo .tab-date{color:#c8f542;}
.meeting-tab.active.beong .tab-date{color:#4fc3f7;}

.tab-gym{font-size:9px;color:#444;letter-spacing:.03em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:90px;}
.meeting-tab.active .tab-gym{color:#666;}

/* 빈 상태 */
#no-meeting{display:none;flex-direction:column;}
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:80px 24px;color:#2a2a2a;}
.empty-state .e-icon{font-size:48px;}
.empty-state .e-text{font-size:12px;letter-spacing:.1em;text-align:center;line-height:1.8;color:#333;}
.empty-state .e-btn{padding:12px 28px;background:#c8f542;border:none;color:#000;font-size:11px;font-weight:900;letter-spacing:.15em;cursor:pointer;font-family:inherit;}

/* 모임 정보 바 */
#meeting-info{padding:12px 20px;background:#0d0d0d;border-bottom:1px solid #1a1a1a;display:flex;align-items:center;gap:8px;}
.info-type-badge{font-size:10px;font-weight:700;padding:3px 10px;letter-spacing:.08em;color:#f0f0f0;}
.info-type-badge.jeongmo{background:rgba(200,245,66,.12);border:1px solid rgba(200,245,66,.2);}
.info-type-badge.beong{background:rgba(79,195,247,.12);border:1px solid rgba(79,195,247,.2);}
.info-gym{font-size:11px;color:#555;flex:1;letter-spacing:.03em;}
.info-date{font-size:10px;color:#333;}
.info-edit-btn{background:transparent;border:1px solid #1e1e1e;color:#333;font-size:10px;padding:4px 10px;cursor:pointer;font-family:inherit;}
.info-del-btn{background:transparent;border:1px solid #1e1e1e;color:#2a2a2a;font-size:10px;padding:4px 10px;cursor:pointer;font-family:inherit;}

/* stats */
#stats{display:flex;border-bottom:1px solid #1a1a1a;}
.stat{flex:1;text-align:center;padding:14px 4px;border-right:1px solid #1a1a1a;}
.stat:last-child{border-right:none;}
.snum{font-size:24px;font-weight:900;line-height:1;color:#f0f0f0;}
.slbl{font-size:8px;letter-spacing:.2em;color:#333;margin-top:3px;}

#prog-wrap{height:3px;background:#111;}
#prog-bar{height:100%;width:0%;background:linear-gradient(90deg,#c8f542,#a8d400);box-shadow:0 0 8px rgba(200,245,66,.4);transition:width .5s ease;}

#sync-bar{text-align:center;font-size:10px;color:#333;padding:7px;letter-spacing:.1em;border-bottom:1px solid #141414;}
#sync-bar.synced{color:#c8f542;}
#sync-bar.error{color:#ff4444;}

#sec-label{font-size:9px;letter-spacing:.35em;color:#222;padding:12px 20px 6px;}

#member-list{padding:0 16px;display:flex;flex-direction:column;gap:5px;padding-bottom:80px;}
.mc{display:flex;align-items:center;gap:10px;padding:12px 14px;background:#111;border:1px solid #181818;position:relative;overflow:hidden;transition:all .2s;}
.mc.att{background:rgba(200,245,66,.04);border-color:rgba(200,245,66,.15);}
.mbar{position:absolute;left:0;top:0;bottom:0;width:3px;background:#1e1e1e;transition:all .3s;}
.mc.att .mbar{background:#c8f542;box-shadow:0 0 8px rgba(200,245,66,.35);}
.mc.pay-only .mbar{background:#4fc3f7;}
.mnum{font-size:10px;color:#2a2a2a;width:20px;text-align:center;font-weight:700;flex-shrink:0;}
.mname{flex:1;font-size:15px;font-weight:700;color:#777;letter-spacing:.04em;transition:color .2s;}
.mc.att .mname{color:#fff;}
.mbtn{padding:6px 12px;font-size:10px;font-weight:700;background:#161616;color:#2a2a2a;border:1px solid #1e1e1e;cursor:pointer;font-family:inherit;flex-shrink:0;transition:all .2s;letter-spacing:.05em;}
.mbtn.att-on{background:rgba(200,245,66,.1);color:#c8f542;border-color:rgba(200,245,66,.25);}
.mbtn.pay-on{background:rgba(79,195,247,.08);color:#4fc3f7;border-color:rgba(79,195,247,.25);}

#legend{display:flex;gap:14px;padding:10px 20px;border-bottom:1px solid #141414;}
.leg{display:flex;align-items:center;gap:5px;font-size:9px;color:#333;letter-spacing:.1em;}
.dot{width:6px;height:6px;border-radius:50%;display:inline-block;}

#bottom{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:rgba(8,8,8,.97);border-top:1px solid #181818;padding:12px 16px;display:flex;gap:8px;backdrop-filter:blur(12px);}
#reset-btn{flex:1;padding:13px;background:transparent;border:1px solid #1e1e1e;color:#333;font-size:11px;letter-spacing:.15em;cursor:pointer;font-family:inherit;}
#copy-btn{flex:2;padding:13px;border:none;color:#000;font-size:11px;font-weight:900;letter-spacing:.15em;cursor:pointer;font-family:inherit;background:#c8f542;transition:all .2s;}

/* 모달 */
#meeting-modal{display:none;position:fixed;inset:0;background:#0a0a0a;z-index:100;overflow-y:auto;max-width:480px;margin:0 auto;}
#meeting-modal.open{display:block;}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:20px;border-bottom:1px solid #1e1e1e;position:sticky;top:0;background:#0a0a0a;}
.modal-cancel{background:transparent;border:1px solid #222;color:#555;font-size:11px;padding:7px 14px;cursor:pointer;font-family:inherit;}
.modal-submit{background:#c8f542;border:none;color:#000;font-size:11px;font-weight:900;padding:7px 16px;cursor:pointer;font-family:inherit;}
.modal-body{padding:20px;display:flex;flex-direction:column;gap:18px;}
.m-label{font-size:9px;letter-spacing:.25em;color:#444;margin-bottom:8px;}
.m-input{width:100%;background:#141414;border:1px solid #1e1e1e;color:#e8e8e8;padding:12px 14px;font-size:14px;font-family:inherit;outline:none;}
.m-input:focus{border-color:#333;}
.type-btns{display:flex;gap:8px;}
.type-btn{flex:1;padding:14px;background:#141414;border:1px solid #1e1e1e;color:#444;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .2s;letter-spacing:.05em;}
.type-btn.sel-jeongmo{background:rgba(200,245,66,.08);border-color:rgba(200,245,66,.3);color:#f0f0f0;}
.type-btn.sel-beong{background:rgba(79,195,247,.08);border-color:rgba(79,195,247,.3);color:#f0f0f0;}
.member-add-row{display:flex;gap:8px;margin-bottom:8px;}
.member-add-inp{flex:1;background:#141414;border:1px solid #1e1e1e;color:#e8e8e8;padding:12px 14px;font-size:14px;font-family:inherit;outline:none;}
.member-add-btn{background:#c8f542;border:none;color:#000;font-size:18px;font-weight:900;width:46px;cursor:pointer;flex-shrink:0;}
.edit-row{display:flex;gap:8px;margin-bottom:6px;}
.edit-row input{flex:1;background:#141414;border:1px solid #1e1e1e;color:#e8e8e8;padding:11px 14px;font-size:13px;font-family:inherit;outline:none;}
.del-btn{background:#141414;border:1px solid #1e1e1e;color:#444;font-size:13px;width:42px;cursor:pointer;flex-shrink:0;}
.member-count{font-size:9px;color:#333;letter-spacing:.15em;margin-bottom:8px;}

/* 체크인 */
#page-checkin{background:#0a0a0a;padding:40px 20px 80px;align-items:center;gap:16px;}
.ci-logo{width:70px;height:70px;object-fit:contain;}
.ci-brand{font-size:18px;font-weight:900;letter-spacing:.2em;color:#eee;}
.ci-sub{font-size:11px;color:#3a3a3a;letter-spacing:.1em;text-align:center;}

#meeting-select-wrap{width:100%;display:flex;flex-direction:column;gap:8px;}
.meeting-select-card{
  width:100%;padding:16px;
  background:#111;border:1px solid #1e1e1e;
  cursor:pointer;font-family:inherit;
  text-align:left;transition:all .2s;
  display:flex;align-items:center;gap:14px;
}
.meeting-select-card:active{transform:scale(0.98);}
.msc-emoji{font-size:24px;flex-shrink:0;}
.msc-info{flex:1;}
.msc-type{font-size:9px;font-weight:700;letter-spacing:.15em;color:#f0f0f0;margin-bottom:4px;}
.msc-date{font-size:16px;font-weight:900;color:#fff;letter-spacing:.05em;margin-bottom:2px;}
.msc-gym{font-size:11px;color:#555;}
.msc-arrow{font-size:14px;color:#333;flex-shrink:0;}

#ci-meeting-tag{background:#141414;border:1px solid #1e1e1e;padding:8px 16px;font-size:11px;color:#555;width:100%;text-align:center;}

#name-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;width:100%;}
.name-btn{padding:16px 8px;background:#111;border:1px solid #1e1e1e;color:#777;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .2s;text-align:center;border-radius:2px;}
.name-btn:active{transform:scale(0.96);}
.name-btn.already-att{background:rgba(200,245,66,.06);border-color:rgba(200,245,66,.2);color:#c8f542;}

/* 완료 */
#page-done{background:#0a0a0a;align-items:center;justify-content:center;gap:18px;padding:40px 24px;}
#done-icon{font-size:72px;}
#done-name{font-size:30px;font-weight:900;color:#fff;letter-spacing:.1em;}
#done-meeting{font-size:11px;color:#444;letter-spacing:.08em;text-align:center;}
#done-msg{font-size:15px;color:#c8f542;letter-spacing:.1em;font-weight:700;}
#done-sub{font-size:11px;color:#333;letter-spacing:.05em;text-align:center;}
#done-back{margin-top:8px;padding:12px 32px;background:transparent;border:1px solid #1e1e1e;color:#333;font-size:11px;letter-spacing:.2em;cursor:pointer;font-family:inherit;}
</style>
</head>
<body>

<!-- 모달 -->
<div id="meeting-modal">
  <div class="modal-header">
    <button class="modal-cancel" onclick="closeMeetingModal()">← 취소</button>
    <span style="font-size:12px;letter-spacing:.2em;color:#666" id="modal-title-txt">새 모임 추가</span>
    <button class="modal-submit" onclick="saveMeeting()">저장</button>
  </div>
  <div class="modal-body">
    <div>
      <div class="m-label">— 종류</div>
      <div class="type-btns">
        <button class="type-btn" id="btn-jeongmo" onclick="selectType('jeongmo')">🏋️ 정모</button>
        <button class="type-btn" id="btn-beong" onclick="selectType('beong')">⚡ 벙</button>
      </div>
    </div>
    <div>
      <div class="m-label">— 날짜</div>
      <input class="m-input" id="m-date" type="date">
    </div>
    <div>
      <div class="m-label">— 헬스장</div>
      <input class="m-input" id="m-gym" placeholder="스포애니 강남점">
    </div>
    <div>
      <div class="m-label">— 참석자 명단</div>
      <div class="member-add-row">
        <input class="member-add-inp" id="new-member-inp" placeholder="이름 입력 후 + 버튼" onkeydown="if(event.key==='Enter')addMemberToList()">
        <button class="member-add-btn" onclick="addMemberToList()">+</button>
      </div>
      <div class="member-count" id="member-count">0명</div>
      <div id="member-edit-list"></div>
    </div>
  </div>
</div>

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const meetingsRef = collection(db, "gbd_meetings");
const ADMIN_PW = "5252";
let meetings=[], currentMeetingId=null, editMeetingId=null;
let selectedType="jeongmo", editMembers=[], selectedCheckinMeetingId=null;
const params = new URLSearchParams(window.location.search);
const mode = params.get("mode");

function showPage(id){
  ["page-main","page-checkin","page-done","page-login"].forEach(p=>document.getElementById(p).classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

function setSyncBar(cls,txt){
  const el=document.getElementById("sync-bar"), el2=document.getElementById("sync-text");
  if(el){el.className=cls;el.textContent=txt;}
  if(el2){el2.textContent=cls==="synced"?"● 실시간 연동 중":"● 연결 중...";el2.style.color=cls==="synced"?"#c8f542":"#444";}
}

const q = query(meetingsRef, orderBy("date","asc"));
onSnapshot(q, snap=>{
  meetings=snap.docs.map(d=>({id:d.id,...d.data()}));
  setSyncBar("synced","● 실시간 연동 중");
  if(mode==="checkin"){showPage("page-checkin");renderCheckinMeetings();}
  else{
    if(sessionStorage.getItem("gbd_admin")==="ok"){showPage("page-main");renderMeetingTabs();}
    else showPage("page-login");
  }
},()=>setSyncBar("error","● 연결 오류"));

window.checkPw=function(){
  const val=document.getElementById("pw-input").value;
  if(val===ADMIN_PW){
    sessionStorage.setItem("gbd_admin","ok");
    document.getElementById("pw-err").textContent="";
    document.getElementById("pw-input").value="";
    showPage("page-main");renderMeetingTabs();
  }else{
    document.getElementById("pw-err").textContent="❌ 비밀번호가 틀렸어요";
    document.getElementById("pw-input").value="";
  }
};

function renderMeetingTabs(){
  const tabs=document.getElementById("meeting-tabs");
  tabs.innerHTML="";
  if(!meetings.length){
    document.getElementById("no-meeting").style.display="flex";
    document.getElementById("meeting-content").style.display="none";
    document.getElementById("bottom").style.display="none";
    return;
  }
  document.getElementById("no-meeting").style.display="none";
  document.getElementById("meeting-content").style.display="block";
  document.getElementById("bottom").style.display="flex";
  if(!currentMeetingId||!meetings.find(m=>m.id===currentMeetingId)) currentMeetingId=meetings[0].id;
  meetings.forEach(m=>{
    const tab=document.createElement("div");
    const isActive=m.id===currentMeetingId;
    tab.className=`meeting-tab ${m.type}${isActive?" active":""}`;
    const dateStr=m.date?m.date.slice(5).replace("-","."):"";
    const emoji=m.type==="jeongmo"?"🏋️":"⚡";
    const typeLabel=m.type==="jeongmo"?"정모":"벙";
    tab.innerHTML=`
      <div class="tab-top">
        <span class="tab-emoji">${emoji}</span>
        <span class="tab-type-label">${typeLabel}</span>
      </div>
      <div class="tab-date">${dateStr}</div>
      <div class="tab-gym">${m.gym||""}</div>
    `;
    tab.onclick=()=>{currentMeetingId=m.id;renderMeetingTabs();renderCurrentMeeting();};
    tabs.appendChild(tab);
  });
  renderCurrentMeeting();
}

function renderCurrentMeeting(){
  const m=meetings.find(m=>m.id===currentMeetingId);
  if(!m) return;
  const dateStr=m.date?m.date.replace(/-/g,"."):"";
  const typeLabel=m.type==="jeongmo"?"🏋️ 정모":"⚡ 벙";
  document.getElementById("info-type").textContent=typeLabel;
  document.getElementById("info-type").className=`info-type-badge ${m.type}`;
  document.getElementById("info-gym").textContent=m.gym||"";
  document.getElementById("info-date").textContent=dateStr;
  const members=m.members||[], status=m.status||[];
  const att=status.filter(s=>s&&s.attend).length;
  const pay=status.filter(s=>s&&s.pay).length;
  const rate=members.length?Math.round(att/members.length*100):0;
  document.getElementById("s-total").textContent=members.length;
  document.getElementById("s-att").textContent=att;
  document.getElementById("s-pay").textContent=pay;
  document.getElementById("s-rate").textContent=rate+"%";
  document.getElementById("prog-bar").style.width=rate+"%";
  const list=document.getElementById("member-list");
  list.innerHTML="";
  members.forEach((name,i)=>{
    const st=status[i]||{};
    const card=document.createElement("div");
    card.className="mc"+(st.attend?" att":(!st.attend&&st.pay?" pay-only":""));
    card.innerHTML=`<div class="mbar"></div>
      <span class="mnum">${String(i+1).padStart(2,"0")}</span>
      <span class="mname">${name}</span>
      <button class="mbtn ${st.attend?"att-on":""}" id="ab${i}">${st.attend?"✓ 출석":"출석"}</button>
      <button class="mbtn ${st.pay?"pay-on":""}" id="pb${i}">${st.pay?"✓ 입금":"입금"}</button>`;
    card.querySelector(`#ab${i}`).onclick=()=>toggle(i,"attend");
    card.querySelector(`#pb${i}`).onclick=()=>toggle(i,"pay");
    list.appendChild(card);
  });
}

async function toggle(i,field){
  const m=meetings.find(m=>m.id===currentMeetingId);
  if(!m) return;
  const status=[...(m.status||m.members.map(()=>({attend:false,pay:false})))];
  if(!status[i]) status[i]={attend:false,pay:false};
  status[i][field]=!status[i][field];
  await setDoc(doc(db,"gbd_meetings",currentMeetingId),{...m,status},{merge:true});
}

window.resetAll=async function(){
  if(!confirm("출석/입금 내역을 초기화할까요?")) return;
  const m=meetings.find(m=>m.id===currentMeetingId);
  if(!m) return;
  await setDoc(doc(db,"gbd_meetings",currentMeetingId),{...m,status:m.members.map(()=>({attend:false,pay:false}))},{merge:true});
};

window.copyResult=function(){
  const m=meetings.find(m=>m.id===currentMeetingId);
  if(!m) return;
  const members=m.members||[], status=m.status||[];
  const a=members.filter((_,i)=>status[i]&&status[i].attend);
  const p=members.filter((_,i)=>status[i]&&status[i].pay);
  const u=members.filter((_,i)=>!status[i]||!status[i].attend);
  const att=status.filter(s=>s&&s.attend).length;
  const rate=members.length?Math.round(att/members.length*100):0;
  const typeStr=m.type==="jeongmo"?"정모":"벙";
  const dateStr=m.date?m.date.replace(/-/g,"."):"";
  const text=`📋 근방단 ${typeStr} 결과 (${dateStr})
🏋️ ${m.gym||""}

✅ 출석완료 (${a.length}/${members.length}명)
${a.join(", ")||"없음"}

💰 입금완료 (${p.length}/${members.length}명)
${p.join(", ")||"없음"}

❌ 미출석 (${u.length}명)
${u.join(", ")||"없음"}

출석률: ${rate}%`;
  navigator.clipboard.writeText(text).then(()=>{
    const btn=document.getElementById("copy-btn");
    btn.textContent="✓ 복사완료!";btn.style.background="#a8d400";
    setTimeout(()=>{btn.textContent="결과 복사";btn.style.background="#c8f542"},1800);
  });
};

window.deleteMeeting=async function(){
  if(!confirm("이 모임을 삭제할까요?")) return;
  await deleteDoc(doc(db,"gbd_meetings",currentMeetingId));
  currentMeetingId=null;
};

window.openAddMeeting=function(){
  editMeetingId=null; editMembers=[];
  selectedType="jeongmo";
  document.getElementById("modal-title-txt").textContent="새 모임 추가";
  document.getElementById("m-date").value=new Date().toISOString().slice(0,10);
  document.getElementById("m-gym").value="";
  selectType("jeongmo");
  renderMemberEditList();
  document.getElementById("meeting-modal").classList.add("open");
};

window.openEditMeeting=function(){
  const m=meetings.find(m=>m.id===currentMeetingId);
  if(!m) return;
  editMeetingId=currentMeetingId;
  editMembers=[...(m.members||[])];
  selectedType=m.type||"jeongmo";
  document.getElementById("modal-title-txt").textContent="모임 편집";
  document.getElementById("m-date").value=m.date||"";
  document.getElementById("m-gym").value=m.gym||"";
  selectType(selectedType);
  renderMemberEditList();
  document.getElementById("meeting-modal").classList.add("open");
};

window.closeMeetingModal=function(){document.getElementById("meeting-modal").classList.remove("open");};

window.selectType=function(type){
  selectedType=type;
  document.getElementById("btn-jeongmo").className="type-btn"+(type==="jeongmo"?" sel-jeongmo":"");
  document.getElementById("btn-beong").className="type-btn"+(type==="beong"?" sel-beong":"");
};

window.saveMeeting=async function(){
  const date=document.getElementById("m-date").value;
  const gym=document.getElementById("m-gym").value.trim();
  const members=editMembers.filter(m=>m.trim());
  if(!date||!gym||!members.length){alert("날짜, 헬스장, 인원을 모두 입력해주세요!");return;}
  const id=editMeetingId||`meeting_${Date.now()}`;
  const existing=editMeetingId?meetings.find(m=>m.id===editMeetingId):null;
  const status=existing?(existing.status||members.map(()=>({attend:false,pay:false}))):members.map(()=>({attend:false,pay:false}));
  await setDoc(doc(db,"gbd_meetings",id),{type:selectedType,date,gym,members,status});
  currentMeetingId=id;
  window.closeMeetingModal();
};

function renderMemberEditList(){
  const c=document.getElementById("member-edit-list");
  c.innerHTML="";
  document.getElementById("member-count").textContent=`${editMembers.filter(m=>m.trim()).length}명`;
  editMembers.forEach((name,i)=>{
    const row=document.createElement("div");row.className="edit-row";
    const inp=document.createElement("input");inp.value=name;
    inp.oninput=()=>{editMembers[i]=inp.value;document.getElementById("member-count").textContent=`${editMembers.filter(m=>m.trim()).length}명`;};
    const del=document.createElement("button");del.className="del-btn";del.textContent="✕";
    del.onclick=()=>{editMembers.splice(i,1);renderMemberEditList();};
    row.appendChild(inp);row.appendChild(del);c.appendChild(row);
  });
}

window.addMemberToList=function(){
  const inp=document.getElementById("new-member-inp");
  if(inp.value.trim()){editMembers.push(inp.value.trim());inp.value="";renderMemberEditList();}
};

// 체크인
function renderCheckinMeetings(){
  const wrap=document.getElementById("meeting-select-wrap");
  wrap.innerHTML="";
  document.getElementById("meeting-select-section").style.display="block";
  document.getElementById("name-select-section").style.display="none";
  if(!meetings.length){
    wrap.innerHTML='<div style="text-align:center;color:#2a2a2a;font-size:12px;padding:40px 0;letter-spacing:.1em;">현재 모임이 없어요</div>';
    return;
  }
  meetings.forEach(m=>{
    const btn=document.createElement("button");
    btn.className="meeting-select-card";
    const dateStr=m.date?m.date.replace(/-/g,"."):"";
    const emoji=m.type==="jeongmo"?"🏋️":"⚡";
    const typeLabel=m.type==="jeongmo"?"정모":"벙";
    btn.innerHTML=`
      <div class="msc-emoji">${emoji}</div>
      <div class="msc-info">
        <div class="msc-type">${typeLabel}</div>
        <div class="msc-date">${dateStr}</div>
        <div class="msc-gym">${m.gym||""}</div>
      </div>
      <div class="msc-arrow">›</div>
    `;
    btn.onclick=()=>selectCheckinMeeting(m.id);
    wrap.appendChild(btn);
  });
}

function selectCheckinMeeting(id){
  selectedCheckinMeetingId=id;
  const m=meetings.find(m=>m.id===id);
  if(!m) return;
  const dateStr=m.date?m.date.replace(/-/g,"."):"";
  const typeLabel=m.type==="jeongmo"?"🏋️ 정모":"⚡ 벙";
  document.getElementById("ci-meeting-tag").textContent=`${typeLabel}  ·  ${dateStr}  ·  ${m.gym||""}`;
  document.getElementById("meeting-select-section").style.display="none";
  document.getElementById("name-select-section").style.display="block";
  const grid=document.getElementById("name-grid");
  grid.innerHTML="";
  const members=m.members||[], status=m.status||[];
  members.forEach((name,i)=>{
    const btn=document.createElement("button");
    btn.className="name-btn"+(status[i]&&status[i].attend?" already-att":"");
    btn.textContent=(status[i]&&status[i].attend?"✓ "+name:name);
    btn.onclick=()=>checkIn(i);
    grid.appendChild(btn);
  });
}

async function checkIn(i){
  const m=meetings.find(m=>m.id===selectedCheckinMeetingId);
  if(!m) return;
  const status=[...(m.status||m.members.map(()=>({attend:false,pay:false})))];
  if(status[i]&&status[i].attend){alert(m.members[i]+"님은 이미 출석했어요! ✅");return;}
  if(!status[i]) status[i]={attend:false,pay:false};
  status[i].attend=true;
  await setDoc(doc(db,"gbd_meetings",selectedCheckinMeetingId),{...m,status},{merge:true});
  document.getElementById("done-name").textContent=m.members[i];
  const dateStr=m.date?m.date.replace(/-/g,"."):"";
  document.getElementById("done-meeting").textContent=`${m.type==="jeongmo"?"🏋️ 정모":"⚡ 벙"}  ·  ${dateStr}  ·  ${m.gym||""}`;
  showPage("page-done");
}

window.backToMeetingSelect=function(){
  selectedCheckinMeetingId=null;
  showPage("page-checkin");
  renderCheckinMeetings();
};
</script>
